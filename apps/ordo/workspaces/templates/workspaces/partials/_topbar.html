{% load static %}
<header class="topbar">
    <a href="{% url 'workspaces:dashboard' %}{% if selected_workspace_slug %}?workspace={{ selected_workspace_slug }}{% endif %}" class="topbar-logo" aria-label="Ordo workspaces">
        <img src="{% static 'ordo-assets/ordo-logo.png' %}" alt="Ordo" class="topbar-logo-image">
    </a>

    {% include "workspaces/partials/_workspace_selector.html" %}

    <label class="topbar-search" aria-label="Search">
        <span class="topbar-search-icon">⌕</span>
        <input type="text" placeholder="Search tasks, projects, people..." disabled>
    </label>

    <div class="topbar-actions">
        <button class="icon-button" type="button" aria-label="Help">?</button>
        <button class="icon-button notification-button" type="button" aria-label="Notifications">
            ⌁
            <span class="badge">3</span>
        </button>
        <button class="profile-button" type="button">
            <div class="avatar">
                {% if current_workspace %}
                    {{ current_workspace.name|slice:":1"|upper }}
                {% else %}
                    O
                {% endif %}
            </div>
            <div class="profile-info">
                <span class="profile-name">Workspace Shell</span>
                <span class="profile-role">UI Template</span>
            </div>
            <span class="chevron">▾</span>
        </button>
    </div>
</header>
