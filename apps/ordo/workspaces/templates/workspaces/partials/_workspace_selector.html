<div class="topbar-workspace-menu" data-workspace-menu>
    <button class="topbar-workspace-selector" type="button" aria-haspopup="true" aria-expanded="false" data-workspace-trigger>
        <div class="topbar-workspace-icon">
            {% if current_workspace %}
                {{ current_workspace.name|slice:":1"|upper }}
            {% else %}
                O
            {% endif %}
        </div>

        <div class="topbar-workspace-info">
            <span class="topbar-workspace-label">Workspace</span>
            <span class="topbar-workspace-name">
                {% if current_workspace %}
                    {{ current_workspace.name }}
                {% else %}
                    Select workspace
                {% endif %}
            </span>
        </div>

        <span class="chevron">▾</span>
    </button>

    <div class="topbar-workspace-menu-list" data-workspace-dropdown>
        {% for workspace in workspaces %}
            <a href="{% url 'workspaces:dashboard' workspace.slug %}" class="topbar-workspace-menu-item{% if current_workspace and workspace.pk == current_workspace.pk %} active{% endif %}">
                <span class="topbar-workspace-menu-icon" aria-hidden="true">{{ workspace.name|slice:":1"|upper }}</span>
                <span class="topbar-workspace-menu-copy">
                    <span class="topbar-workspace-menu-name">{{ workspace.name }}</span>
                </span>
            </a>
        {% endfor %}
        {% if can_create_workspace %}
            <a class="topbar-workspace-menu-item topbar-workspace-menu-create" href="{% url 'workspaces:workspace_create' %}" data-modal-open="create-workspace-modal">
                <span class="topbar-workspace-menu-create-icon" aria-hidden="true">+</span>
                <span class="topbar-workspace-menu-create-copy">
                    <span class="topbar-workspace-menu-name">New workspace</span>
                    <span class="topbar-workspace-menu-meta">Create a separate workspace</span>
                </span>
            </a>
        {% endif %}
    </div>
</div>
