{% csrf_token %}
<input type="hidden" name="board" value="{{ selected_board.id }}">

<label class="settings-label">Title</label>
<input class="shell-input" type="text" name="title" data-task-field="title" placeholder="Task title" required>

<label class="settings-label">Description</label>
<textarea class="shell-input" name="description" data-task-field="description" placeholder="Add a description..."></textarea>

<div class="task-field-row">
    <div class="task-field">
        <label class="settings-label">Column</label>
        <select class="shell-input" name="column" data-task-field="column">
            {% for entry in board_columns %}
                <option value="{{ entry.column.id }}"{% if entry.column.key == 'todo' %} selected{% endif %}>{{ entry.column.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="task-field">
        <label class="settings-label">Priority</label>
        <select class="shell-input" name="priority" data-task-field="priority">
            {% for value, label in task_priorities %}
                <option value="{{ value }}"{% if value == 'normal' %} selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
    </div>
</div>

<div class="task-field">
    <label class="settings-label">Due date</label>
    <input class="shell-input" type="date" name="due_date" data-task-field="due_date">
</div>

<div class="task-field">
    <label class="settings-label">Assignees</label>
    {% include "workspaces/tasks/_task_people_field.html" with people_name="assignees" people_placeholder="Add assignees…" %}
</div>

<div class="task-field">
    <label class="settings-label">Observers</label>
    {% include "workspaces/tasks/_task_people_field.html" with people_name="observers" people_placeholder="Add observers…" %}
</div>
