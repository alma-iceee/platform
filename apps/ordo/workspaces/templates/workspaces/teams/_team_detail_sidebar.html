<section class="workspace-sidebar-section">
    <div class="workspace-sidebar-header">
        <a class="team-back-link"
           href="{% url 'workspaces:teams' selected_workspace_slug %}">
            <i data-lucide="arrow-left" aria-hidden="true"></i>
            <span>Teams</span>
        </a>
    </div>
    <h2 class="workspace-sidebar-title team-detail-title">{{ selected_workspace_team.name }}</h2>

    <nav class="workspace-sidebar-nav">
        <a class="workspace-sidebar-nav-item{% if team_section == 'edit' %} is-active{% endif %}"
           href="{% url 'workspaces:team-detail' selected_workspace_slug selected_workspace_team.id %}">
            <i data-lucide="sliders-horizontal" class="settings-nav-icon"></i>
            <span class="list-copy">
                <span class="list-title">Edit team</span>
            </span>
        </a>
        <a class="workspace-sidebar-nav-item{% if team_section == 'members' %} is-active{% endif %}"
           href="{% url 'workspaces:team-members' selected_workspace_slug selected_workspace_team.id %}">
            <i data-lucide="users" class="settings-nav-icon"></i>
            <span class="list-copy">
                <span class="list-title">Team members</span>
            </span>
        </a>
    </nav>
</section>
