<section class="workspace-sidebar-section">
    <div class="workspace-sidebar-header">
        <h2 class="workspace-sidebar-title">Teams</h2>
        <div class="workspace-sidebar-actions">
            <a class="panel-add-button"
               href="{% url 'workspaces:teams' %}{% if selected_workspace_slug %}?workspace={{ selected_workspace_slug }}{% endif %}"
               aria-label="Create new team">+</a>
        </div>
    </div>

    <nav class="workspace-sidebar-nav">
        <a class="workspace-sidebar-nav-item{% if is_team_create_mode %} is-active{% endif %}"
           href="{% url 'workspaces:teams' %}{% if selected_workspace_slug %}?workspace={{ selected_workspace_slug }}{% endif %}">
            <span class="list-dot blue"></span>
            <span class="list-copy">
                <span class="list-title">New Team</span>
                <span class="list-meta">Create team</span>
            </span>
            {% if is_team_create_mode %}
                <span class="list-arrow">›</span>
            {% endif %}
        </a>

        {% for item in workspace_team_items %}
            <a class="workspace-sidebar-nav-item{% if item.is_active %} is-active{% endif %}"
               href="{% url 'workspaces:team-detail' item.instance.id %}?workspace={{ selected_workspace_slug }}">
                {% include "workspaces/teams/_team_row.html" %}
            </a>
        {% empty %}
            <div class="empty-panel-state">
                <p>No teams in this workspace yet.</p>
            </div>
        {% endfor %}
    </nav>
</section>
