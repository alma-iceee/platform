{% extends "workspaces/shell.html" %}

{% block title %}New workspace | Ordo{% endblock %}

{% block workspace_sidebar %}{% endblock %}

{% block workspace_content %}
    <div class="workspace-page workspace-page--single">
        <section class="workspace-content settings-grid">
            <div class="settings-page-header">
                <h1><i data-lucide="circle-plus" class="page-header-icon"></i>New workspace</h1>
            </div>

            <form method="post" class="settings-form settings-card">
                {% include "workspaces/workspaces/_create_form_fields.html" %}

                <div class="workspace-form-actions">
                    <button type="submit" class="shell-button">Create workspace</button>
                    <a href="{{ cancel_url }}" class="shell-button shell-button-secondary workspace-cancel-link">Cancel</a>
                </div>
            </form>
        </section>
    </div>
{% endblock %}
