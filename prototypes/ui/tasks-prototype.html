<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ordo — Tasks Prototype</title>
    <link rel="icon" href="assets/ordo-favicon.png" type="image/png">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/tasks.css">
</head>
<body>
<div class="app-layout">
    <!-- Topbar -->
    <header class="topbar">
        <div class="topbar-left">
            <a href="#" class="brand-logo" aria-label="Ordo home">
                <img src="assets/ordo-logo.png" alt="Ordo">
            </a>

            <button class="workspace-selector" type="button">
                <div class="workspace-icon">A</div>
                <div class="workspace-info">
                    <span class="workspace-label">Workspace</span>
                    <span class="workspace-name">AltynGroup Qazaqstan</span>
                </div>
                <span class="chevron">▾</span>
            </button>
        </div>

        <div class="topbar-center">
            <label class="topbar-search" aria-label="Search">
                <span class="search-icon">⌕</span>
                <input type="text" placeholder="Search tasks, projects, people...">
            </label>
        </div>

        <div class="topbar-actions">
            <button class="icon-button" type="button" aria-label="Help">?</button>
            <button class="icon-button notification-button" type="button" aria-label="Notifications">
                ⌁<span class="badge">3</span>
            </button>
            <button class="profile-button" type="button">
                <div class="avatar">A</div>
                <div class="profile-info">
                    <span class="profile-name">Almas</span>
                    <span class="profile-role">Product Owner</span>
                </div>
                <span class="chevron">▾</span>
            </button>
        </div>
    </header>

    <div class="content-shell">
        <!-- Icon sidebar -->
        <aside class="sidebar" aria-label="Primary navigation">
            <nav class="sidebar-nav">
                <a href="#" class="sidebar-item" title="Dashboard"><i data-lucide="layout-dashboard"></i></a>
                <a href="#" class="sidebar-item" title="Departments"><i data-lucide="building-2"></i></a>
                <a href="#" class="sidebar-item active" title="Tasks"><i data-lucide="square-check-big"></i></a>
                <a href="#" class="sidebar-item" title="Projects"><i data-lucide="kanban"></i></a>
                <a href="#" class="sidebar-item" title="Teams"><i data-lucide="users-round"></i></a>
                <a href="#" class="sidebar-item" title="Chats"><i data-lucide="messages-square"></i></a>
                <a href="#" class="sidebar-item" title="Storage"><i data-lucide="database"></i></a>
                <a href="#" class="sidebar-item" title="Settings"><i data-lucide="settings"></i></a>
            </nav>
            <button class="sidebar-collapse" type="button" aria-label="Collapse sidebar">></button>
        </aside>

        <!-- Main -->
        <main class="main-area tasks-main">
            <!-- Toolbar -->
            <div class="tasks-toolbar">
                <div class="tasks-heading">
                    <span class="tasks-eyebrow">Website Redesign</span>
                    <h1 class="tasks-title">Tasks</h1>
                </div>

                <div class="toolbar-spacer"></div>

                <div class="view-switch" role="tablist">
                    <button class="active" data-view="list"><i data-lucide="list"></i>List</button>
                    <button data-view="board"><i data-lucide="columns-3"></i>Board</button>
                    <button data-view="calendar"><i data-lucide="calendar-days"></i>Calendar</button>
                </div>

                <button class="btn btn-ghost"><i data-lucide="list-filter"></i>Filter</button>
                <button class="btn btn-primary" data-new-task><i data-lucide="plus"></i>New task</button>
            </div>

            <div class="tasks-body">
                <!-- ===================== LIST VIEW ===================== -->
                <section class="view active" data-view-panel="list">
                    <table class="task-table">
                        <thead>
                            <tr>
                                <th style="width:42%">Task</th>
                                <th>Status</th>
                                <th>Assignee</th>
                                <th>Priority</th>
                                <th>Due date</th>
                            </tr>
                        </thead>
                        <tbody id="list-rows"><!-- filled by JS --></tbody>
                    </table>
                </section>

                <!-- ===================== BOARD VIEW ===================== -->
                <section class="view" data-view-panel="board">
                    <div class="kanban" id="board"><!-- filled by JS --></div>
                </section>

                <!-- ===================== CALENDAR VIEW ===================== -->
                <section class="view" data-view-panel="calendar">
                    <div class="cal-head">
                        <div class="cal-month">June 2026</div>
                        <div class="cal-nav">
                            <button aria-label="Previous month"><i data-lucide="chevron-left"></i></button>
                            <button aria-label="Next month"><i data-lucide="chevron-right"></i></button>
                        </div>
                        <div class="toolbar-spacer"></div>
                        <button class="btn btn-ghost"><i data-lucide="calendar-clock"></i>Today</button>
                    </div>
                    <div class="cal-grid" id="calendar"><!-- filled by JS --></div>
                </section>
            </div>
        </main>
    </div>
</div>

<!-- ===================== TASK MODAL ===================== -->
<div class="modal-overlay" id="task-modal">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-head">
            <span class="badge s-progress"><span class="dot"></span><span id="modal-status-label">In Progress</span></span>
            <button class="icon-btn" title="Copy link"><i data-lucide="link"></i></button>
            <button class="icon-btn" data-close-modal title="Close"><i data-lucide="x"></i></button>
        </div>

        <div class="modal-body">
            <div class="field">
                <label>Title</label>
                <input type="text" class="title-input" id="modal-title" value="Свёрстать главную страницу">
            </div>

            <div class="field">
                <label>Description</label>
                <textarea placeholder="Add a description...">Адаптивная вёрстка hero-секции и блока преимуществ по макету из Figma. Поддержка тёмной темы.</textarea>
            </div>

            <div class="field-row">
                <div class="field">
                    <label>Status</label>
                    <select id="modal-status">
                        <option>To Do</option>
                        <option selected>In Progress</option>
                        <option>Review</option>
                        <option>Done</option>
                    </select>
                </div>
                <div class="field">
                    <label>Priority</label>
                    <select>
                        <option>Low</option>
                        <option selected>High</option>
                        <option>Medium</option>
                        <option>Urgent</option>
                    </select>
                </div>
            </div>

            <div class="field-row">
                <div class="field">
                    <label>Assignee</label>
                    <div class="chips">
                        <span class="assignee-pick"><span class="avatar-sm av-blue">АИ</span>Almas Iceev</span>
                    </div>
                </div>
                <div class="field">
                    <label>Due date</label>
                    <input type="text" value="18 Jun 2026">
                </div>
            </div>

            <div class="field">
                <label>Labels</label>
                <div class="chips">
                    <span class="tag">frontend</span>
                    <span class="tag">UI</span>
                    <span class="tag">figma</span>
                    <button class="icon-btn" style="width:28px;height:28px" title="Add label"><i data-lucide="plus"></i></button>
                </div>
            </div>

            <div class="field">
                <label>Subtasks · 1/3</label>
                <div class="subtasks">
                    <div class="subtask done"><span class="check"><i data-lucide="check"></i></span><span>Подготовить grid-сетку</span></div>
                    <div class="subtask"><span class="check"></span><span>Hero-секция</span></div>
                    <div class="subtask"><span class="check"></span><span>Блок преимуществ</span></div>
                </div>
            </div>
        </div>

        <div class="modal-foot">
            <button class="btn btn-danger"><i data-lucide="trash-2"></i>Delete</button>
            <div class="spacer"></div>
            <button class="btn btn-ghost" data-close-modal>Cancel</button>
            <button class="btn btn-primary"><i data-lucide="check"></i>Save task</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
// ---------- Demo data ----------
const USERS = {
    ai: { name: "Almas Iceev", initials: "АИ", av: "av-blue" },
    dk: { name: "Дана К.",      initials: "ДК", av: "av-purple" },
    rs: { name: "Рустам С.",    initials: "РС", av: "av-gold" },
    mt: { name: "Мария Т.",     initials: "МТ", av: "av-green" },
};
const STATUS = {
    todo:     { label: "To Do",       cls: "s-todo",     col: "#8ea2c0" },
    progress: { label: "In Progress", cls: "s-progress", col: "#12c9ff" },
    review:   { label: "Review",      cls: "s-review",   col: "#a986ff" },
    done:     { label: "Done",        cls: "s-done",     col: "#34d399" },
};
const PRIO = {
    low:    { label: "Low",    cls: "low",    icon: "signal-low" },
    medium: { label: "Medium", cls: "medium", icon: "signal-medium" },
    high:   { label: "High",   cls: "high",   icon: "signal-high" },
    urgent: { label: "Urgent", cls: "urgent", icon: "flame" },
};
const DOT = { todo: "blue", progress: "cyan", review: "purple", done: "green" };

const TASKS = [
    { id: 1, title: "Свёрстать главную страницу", status: "progress", prio: "high",   assignee: "ai", due: "18 Jun", day: 18, ev: "e-cyan" },
    { id: 2, title: "Дизайн карточки задачи",     status: "review",   prio: "medium", assignee: "dk", due: "16 Jun", day: 16, ev: "e-purple" },
    { id: 3, title: "API списка задач",            status: "todo",     prio: "urgent", assignee: "rs", due: "20 Jun", day: 20, ev: "e-blue" },
    { id: 4, title: "Настроить CI пайплайн",       status: "done",     prio: "low",    assignee: "rs", due: "12 Jun", day: 12, ev: "e-green" },
    { id: 5, title: "Канбан-доска drag & drop",    status: "progress", prio: "high",   assignee: "mt", due: "24 Jun", day: 24, ev: "e-cyan" },
    { id: 6, title: "Календарный вид",             status: "todo",     prio: "medium", assignee: "ai", due: "26 Jun", day: 26, ev: "e-blue" },
    { id: 7, title: "Модалка создания задачи",     status: "review",   prio: "high",   assignee: "dk", due: "17 Jun", day: 17, ev: "e-purple" },
    { id: 8, title: "Согласовать макеты с PO",     status: "done",     prio: "medium", assignee: "mt", due: "10 Jun", day: 10, ev: "e-green" },
    { id: 9, title: "Фильтры и поиск задач",       status: "todo",     prio: "low",    assignee: "rs", due: "30 Jun", day: 30, ev: "e-amber" },
];

const el = (html) => { const t = document.createElement("template"); t.innerHTML = html.trim(); return t.content.firstChild; };
const userChip = (u) => `<span class="avatar-sm ${USERS[u].av}">${USERS[u].initials}</span>`;

// ---------- List ----------
function renderList() {
    const body = document.getElementById("list-rows");
    body.innerHTML = "";
    TASKS.forEach(t => {
        const s = STATUS[t.status], p = PRIO[t.prio], u = USERS[t.assignee];
        const overdue = t.status !== "done" && t.day < 15;
        body.appendChild(el(`
            <tr data-open-task>
                <td><div class="task-name"><span class="list-dot ${DOT[t.status]}"></span>${t.title}</div></td>
                <td><span class="badge ${s.cls}"><span class="dot"></span>${s.label}</span></td>
                <td><div class="cell-assignee">${userChip(t.assignee)}${u.name}</div></td>
                <td><span class="prio ${p.cls}"><i data-lucide="${p.icon}"></i>${p.label}</span></td>
                <td><span class="cell-due ${overdue ? "overdue" : ""}">${t.due} 2026</span></td>
            </tr>`));
    });
}

// ---------- Board ----------
function renderBoard() {
    const board = document.getElementById("board");
    board.innerHTML = "";
    Object.entries(STATUS).forEach(([key, s]) => {
        const items = TASKS.filter(t => t.status === key);
        const col = el(`
            <div class="kanban-col">
                <div class="kanban-col-head">
                    <span class="dot" style="background:${s.col}"></span>
                    <span class="name">${s.label}</span>
                    <span class="count">${items.length}</span>
                </div>
                <div class="kanban-cards"></div>
                <button class="kanban-add" data-new-task><i data-lucide="plus"></i>Add task</button>
            </div>`);
        const cards = col.querySelector(".kanban-cards");
        items.forEach(t => {
            const p = PRIO[t.prio];
            cards.appendChild(el(`
                <div class="kanban-card" data-open-task>
                    <div class="kc-top"><span class="kc-title">${t.title}</span></div>
                    <div class="kc-tags"><span class="prio ${p.cls}"><i data-lucide="${p.icon}"></i>${p.label}</span></div>
                    <div class="kc-meta">
                        ${userChip(t.assignee)}
                        <span class="spacer"></span>
                        <span class="kc-due"><i data-lucide="calendar"></i>${t.due}</span>
                    </div>
                </div>`));
        });
        board.appendChild(col);
    });
}

// ---------- Calendar (June 2026: starts Monday, 30 days) ----------
function renderCalendar() {
    const grid = document.getElementById("calendar");
    grid.innerHTML = "";
    ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].forEach(d => grid.appendChild(el(`<div class="cal-dow">${d}</div>`)));
    // June 1 2026 is a Monday → offset 0. Show 2 trailing May days? Keep simple: full 30 + leading/trailing.
    const firstDow = 0; // Monday
    const daysInMonth = 30;
    const today = 15;
    // leading from previous month (May has 31)
    for (let i = 0; i < firstDow; i++) {
        grid.appendChild(el(`<div class="cal-cell muted"><span class="cal-date">${31 - firstDow + 1 + i}</span></div>`));
    }
    for (let d = 1; d <= daysInMonth; d++) {
        const cell = el(`<div class="cal-cell ${d === today ? "today" : ""}"><span class="cal-date">${d}</span></div>`);
        TASKS.filter(t => t.day === d).slice(0, 3).forEach(t => {
            cell.appendChild(el(`<div class="cal-event ${t.ev}" data-open-task><span class="dot" style="background:${STATUS[t.status].col}"></span>${t.title}</div>`));
        });
        grid.appendChild(cell);
    }
    // trailing to complete 6th row if needed
    const total = firstDow + daysInMonth;
    const trailing = (7 - (total % 7)) % 7;
    for (let i = 1; i <= trailing; i++) {
        grid.appendChild(el(`<div class="cal-cell muted"><span class="cal-date">${i}</span></div>`));
    }
}

// ---------- View switching ----------
document.querySelectorAll(".view-switch button").forEach(btn => {
    btn.addEventListener("click", () => {
        document.querySelectorAll(".view-switch button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        const v = btn.dataset.view;
        document.querySelectorAll("[data-view-panel]").forEach(p => p.classList.toggle("active", p.dataset.viewPanel === v));
    });
});

// ---------- Modal ----------
const modal = document.getElementById("task-modal");
const openModal = () => { modal.classList.add("open"); document.body.style.overflow = "hidden"; };
const closeModal = () => { modal.classList.remove("open"); document.body.style.overflow = ""; };

document.addEventListener("click", (e) => {
    if (e.target.closest("[data-open-task]")) openModal();
    if (e.target.closest("[data-new-task]")) openModal();
    if (e.target.closest("[data-close-modal]")) closeModal();
    if (e.target === modal) closeModal(); // click on backdrop
});
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

// Reflect status select → header badge
document.getElementById("modal-status").addEventListener("change", (e) => {
    const map = { "To Do": "todo", "In Progress": "progress", "Review": "review", "Done": "done" };
    const k = map[e.target.value];
    const badge = modal.querySelector(".modal-head .badge");
    badge.className = "badge " + STATUS[k].cls;
    badge.innerHTML = `<span class="dot"></span><span id="modal-status-label">${STATUS[k].label}</span>`;
});

// ---------- Init ----------
renderList();
renderBoard();
renderCalendar();
lucide.createIcons();
</script>
</body>
</html>
